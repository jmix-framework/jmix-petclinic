main.datasource.url=jdbc:hsqldb:file:.jmix/hsqldb/jmixpetclinic5
main.datasource.username=sa
main.datasource.password=

main.liquibase.change-log=io/jmix/petclinic/liquibase/changelog.xml

jmix.ui.login-view-id=LoginView
jmix.ui.main-view-id=MainView
jmix.ui.menu-config=io/jmix/petclinic/menu.xml
jmix.ui.composite-menu=false

ui.login.defaultUsername=joy
ui.login.defaultPassword=joy

jmix.core.available-locales=en

# Launch the default browser when starting the application in development mode
vaadin.launch-browser=false

logging.level.org.atmosphere=warn

# 'debug' level logs SQL generated by EclipseLink ORM
logging.level.eclipselink.logging.sql=info

# 'debug' level logs data store operations
logging.level.io.jmix.core.datastore=info

# 'debug' level logs access control constraints
logging.level.io.jmix.core.AccessLogger=info

# 'debug' level logs all Jmix debug output
logging.level.io.jmix=info

logging.level.liquibase=warn
logging.level.io.jmix.petclinic=info

petclinic.testdata.visit.visitStartAmountPastDays=350
petclinic.testdata.visit.visitStartAmountFutureDays=60
petclinic.testdata.visit.amountPerDay=10
petclinic.testdata.visit.descriptionOptions=Regular Checkup, Surgery, Fever

server.servlet.context-path=/petclinic
jmix.ui.view-file-extensions=htm, html, jpg, png, jpeg, pdf
jmix.ui.navigation.use-nanoseconds-in-url-params=false
jmix.eclipselink.use-inner-join-in-condition=true

# ===== AI Tools add-on — Spring AI model provider (local Ollama) =====
# Ollama REST endpoint. This is the Spring AI default; kept explicit to document
# that the app talks to a locally running `ollama serve` on port 11434.
spring.ai.ollama.base-url=http://localhost:11434
# Chat model backing the AI assistant. MUST support tool calling (the add-on
# drives the model through tools) — qwen3:14b advertises the "tools" capability.
spring.ai.ollama.chat.model=qwen3:8b
# Context window. Raise toward the model maximum (qwen3:14b supports 40960) if the
# assistant truncates tool schemas; lower it if the machine hits RAM/VRAM limits.
spring.ai.ollama.chat.num-ctx=16384
logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=debug
logging.level.io.jmix.aitools=debug
server.port=8081

jmix.aitools.dataload.include-packages=io.jmix.petclinic